# ==============================================================
# Docker Compose — Personal Finance Dashboard (Full Stack)
# ==============================================================
# Start everything:    docker compose up --build
# Start DB only:       docker compose up postgres -d
# Tear down + data:    docker compose down -v
# Run tests:           bash scripts/test-docker.sh
# ==============================================================

version: '3.8'

services:

  # ─── PostgreSQL 15 Database ────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: finance-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_db
      POSTGRES_USER: finance_user
      POSTGRES_PASSWORD: finance_pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - finance-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance_user -d finance_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Spring Boot Backend ───────────────────────────────────────
  backend:
    build: ./backend
    container_name: finance-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      APP_JWT_SECRET: bXlfc3VwZXJfc2VjcmV0X2tleV9mb3JfZmluYW5jZV9hcHBfMjAyNl9jaGFuZ2VfaW5fcHJvZA==
      APP_JWT_ACCESS_TOKEN_EXPIRATION: "900000"
      APP_JWT_REFRESH_TOKEN_EXPIRATION: "604800000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - finance-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── React Frontend (Nginx) ────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: finance-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - finance-network

# ─── Volumes ─────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ─── Network ─────────────────────────────────────────────────────
networks:
  finance-network:
    driver: bridge
